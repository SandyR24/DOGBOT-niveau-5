<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dogbot Expert</title>

<style>
body{
    font-family: Arial;
    background:#eef;
    text-align:center;
}

/* PROGRESSION */
#progress{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

.dot{
    width:20px;
    height:20px;
    border-radius:50%;
    border:2px solid #555;
    background:white;
}

.success{ background:#4CAF50; }
.fail{ background:#f44336; }

/* LAYOUT */
#main{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:20px;
}

/* GRID */
#grid{
    display:grid;
    grid-template-columns:repeat(5,80px);
    grid-template-rows:repeat(5,80px);
    gap:2px;
}

.cell{
    width:80px;
    height:80px;
    background:white;
    border:1px solid #ccc;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* IMAGES */
.cell img{
    max-width:70%;
    max-height:70%;
    position:absolute;
}

/* SAC */
.target{
    width:60%;
    height:60%;
    top:20%;
    left:20%;
}

/* OBSTACLES */
.obstacle{
    font-size:28px;
}

/* PANEL */
#panel{
    width:230px;
}

button{
    padding:10px;
    margin:5px;
    font-size:18px;
    cursor:pointer;
}

/* GO BUTTON */
#go{
    background:#4CAF50;
    color:white;
    width:100%;
    font-size:20px;
}

/* COMMANDS */
#command-list{
    min-height:80px;
    border:2px dashed purple;
    margin-top:10px;
    padding:10px;
}

.command{
    display:inline-block;
    margin:3px;
    padding:5px;
    background:#ddd;
}

#feedback{
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🐶 Dogbot Expert</h1>

<!-- PROGRESSION -->
<div id="progress"></div>

<div id="main">

<div id="grid"></div>

<div id="panel">

    <div>
        <button onclick="add('up')">↑</button><br>
        <button onclick="add('left')">←</button>
        <button onclick="add('down')">↓</button>
        <button onclick="add('right')">→</button>
    </div>

    <button id="go" onclick="run()">GO</button>

    <div>
        <button onclick="undo()">↩️ Effacer</button>
        <button onclick="reset()">Reset</button>
    </div>

    <div id="command-list"></div>
    <div id="feedback"></div>

</div>

</div>

<script>

const dogA="images/DogBot2A.png";
const dogB="images/DogBot2B.png";
const targetImg="https://i.postimg.cc/xTYzhrLx/logo.png";

const obstacleIcons=["🌵","🌹","🌳","🪨"];

let dog,target,commands=[];
let finished=false;
let levelIndex=0;
let results=[];

/* ===== PROGRESSION ===== */
function initProgress(){
    let p=document.getElementById("progress");
    p.innerHTML="";
    for(let i=0;i<5;i++){
        let d=document.createElement("div");
        d.className="dot";
        p.appendChild(d);
    }
}

function updateProgress(success){
    results.push(success);

    let dots=document.getElementById("progress").children;
    results.forEach((r,i)=>{
        dots[i].className="dot "+(r?"success":"fail");
    });
}

/* ===== NIVEAUX ===== */
const levels=[

{dog:{x:0,y:0},target:{x:4,y:4},
path:[{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:2,y:1},{x:2,y:2},{x:3,y:2},{x:4,y:2},{x:4,y:3},{x:4,y:4}]},

{dog:{x:4,y:0},target:{x:0,y:4},
path:[{x:4,y:0},{x:3,y:0},{x:3,y:1},{x:3,y:2},{x:2,y:2},{x:1,y:2},{x:1,y:3},{x:1,y:4},{x:0,y:4}]},

{dog:{x:0,y:4},target:{x:4,y:0},
path:[{x:0,y:4},{x:1,y:4},{x:2,y:4},{x:2,y:3},{x:2,y:2},{x:3,y:2},{x:3,y:1},{x:3,y:0},{x:4,y:0}]},

{dog:{x:2,y:4},target:{x:2,y:0},
path:[{x:2,y:4},{x:1,y:4},{x:1,y:3},{x:1,y:2},{x:2,y:2},{x:3,y:2},{x:3,y:1},{x:2,y:1},{x:2,y:0}]},

{dog:{x:1,y:1},target:{x:3,y:3},
path:[{x:1,y:1},{x:2,y:1},{x:3,y:1},{x:3,y:2},{x:2,y:2},{x:2,y:3},{x:3,y:3}]}

];

/* ===== GRID ===== */
function draw(){

let grid=document.getElementById("grid");
grid.innerHTML="";

let lvl=levels[levelIndex];
let pathSet=new Set(lvl.path.map(p=>`${p.x},${p.y}`));

for(let y=0;y<5;y++){
for(let x=0;x<5;x++){

let cell=document.createElement("div");
cell.className="cell";

/* obstacles */
if(!pathSet.has(`${x},${y}`)){
let o=document.createElement("div");
o.className="obstacle";
o.textContent=obstacleIcons[(x+y)%4];
cell.appendChild(o);
}

/* target */
if(x===target.x && y===target.y && !finished){
let img=document.createElement("img");
img.src=targetImg;
img.className="target";
cell.appendChild(img);
}

/* dog */
if(x===dog.x && y===dog.y){
let img=document.createElement("img");
img.src=finished?dogB:dogA;
cell.appendChild(img);
}

grid.appendChild(cell);

}
}
}

/* ===== COMMANDES ===== */
function add(dir){
commands.push(dir);

let s=document.createElement("span");
s.className="command";
s.textContent={"up":"↑","down":"↓","left":"←","right":"→"}[dir];
document.getElementById("command-list").appendChild(s);
}

function undo(){
if(commands.length>0){
commands.pop();
let list=document.getElementById("command-list");
list.removeChild(list.lastChild);
}
}

/* ===== MOVE ===== */
function move(dir){

let x=dog.x;
let y=dog.y;

if(dir==="up") y--;
if(dir==="down") y++;
if(dir==="left") x--;
if(dir==="right") x++;

if(x<0||x>4||y<0||y>4){
fail();
return;
}

let valid=levels[levelIndex].path.some(p=>p.x===x&&p.y===y);

if(!valid){
fail();
return;
}

dog={x,y};
draw();

if(x===target.x && y===target.y){
finished=true;
draw();
success();
}
}

function fail(){
document.getElementById("feedback").textContent="Erreur, recommence !";
finished=true;
updateProgress(false);
}

function success(){
document.getElementById("feedback").textContent="🎉 Bravo !";
updateProgress(true);

setTimeout(()=>{
levelIndex++;
if(results.length<5) reset();
},1200);
}

/* ===== RUN ===== */
function run(){

if(commands.length===0){
document.getElementById("feedback").textContent="Ajoute des flèches !";
return;
}

let i=0;

let interval=setInterval(()=>{
if(i>=commands.length||finished){
clearInterval(interval);
return;
}

move(commands[i]);
i++;

},600);
}

/* ===== RESET ===== */
function reset(){

commands=[];
finished=false;

let lvl=levels[levelIndex%levels.length];
dog={...lvl.dog};
target={...lvl.target};

document.getElementById("command-list").innerHTML="";
document.getElementById("feedback").textContent="";

draw();
}

/* INIT */
initProgress();
reset();

</script>

</body>
</html>
